name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your ideas. Please describe what you'd like and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the friction or gap you're experiencing.
      placeholder: "When I try to use v0 for design consultation, I can't easily..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
      description: Describe your ideal solution or workflow.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds you've tried or other approaches that might work?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the extension does this relate to?
      options:
        - MCP tools (generate, refine, get files, etc.)
        - Project management
        - Chat management
        - Setup / configuration
        - Documentation
        - Other
    validations:
      required: true
